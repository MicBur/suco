name: CI

on:
  push:
    # windows-mingw: temporary pre-PR validation of the Windows port — drop after merge.
    branches: [ main, master, windows-mingw ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux-release:
    name: Linux Release Build & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libzstd-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j "$(nproc)"

      - name: Run smoke test (loopback grid + cache hit)
        run: bash tests/ci_smoke_test.sh "$GITHUB_WORKSPACE/build"

      - name: Run cache-correctness suite (no cache poisoning / miscompilation)
        run: bash tests/cache_correctness_test.sh "$GITHUB_WORKSPACE/build"

      - name: Run chaos / robustness suite (crash-resistance + failover)
        run: bash tests/chaos_test.sh "$GITHUB_WORKSPACE/build"

      - name: Build .deb / .tar.gz packages (packaging regression guard)
        working-directory: build
        run: |
          cpack -G "TGZ;DEB"
          ls -1 suco_*_amd64.deb suco-*-Linux.tar.gz
          dpkg-deb -I suco_*_amd64.deb

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: suco-lite-packages
          path: |
            build/suco_*_amd64.deb
            build/suco-*-Linux.tar.gz
          if-no-files-found: error

  build-linux-debug-sanitizers:
    name: Linux Debug Build (ASan + UBSan) & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libzstd-dev

      - name: Configure CMake with Sanitizers
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build
        run: cmake --build build --config Debug -j "$(nproc)"

      - name: Run smoke test under sanitizers
        env:
          # halt_on_error surfaces real bugs; leak detection stays off for now
          # (daemon/coordinator hold intentional process-lifetime allocations —
          # revisit when a leak-clean baseline is established).
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: bash tests/ci_smoke_test.sh "$GITHUB_WORKSPACE/build"

  build-windows-mingw:
    name: Windows MinGW Build & Smoke Test
    runs-on: windows-latest
    # Blocking on purpose — unlike the MSVC job below, this is the toolchain the
    # Windows port is actually developed and verified against (Qt/MinGW GCC), and
    # the smoke test exercises the real loopback grid: dispatch, worker compile
    # via cmd.exe, cache store and cache hit. If this breaks, Windows is broken.
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSYS2 / MinGW64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-zstd

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j "$(nproc)"

      - name: Run smoke test (loopback grid + cache hit)
        run: bash tests/ci_smoke_test.sh "$PWD/build"

  build-windows-msvc:
    name: Windows MSVC Build
    runs-on: windows-latest
    # Non-blocking: Linux is the supported/tested platform. The Windows build is
    # kept as a best-effort signal but must not fail the overall CI badge.
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies via vcpkg
        # sqlite3 was missing since the coordinator gained its SQLite HistoryWriter
        # (2.1.0) — find_package(SQLite3 REQUIRED) made configure fail ever since,
        # silently, because this job is continue-on-error.
        run: |
          vcpkg install openssl zstd sqlite3 --triplet x64-windows

      - name: Configure CMake
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release
