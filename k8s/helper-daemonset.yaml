apiVersion: v1
kind: Service
metadata:
  name: suco-helper-service
  namespace: suco
spec:
  ports:
    - port: 9000
      targetPort: 9000
  selector:
    app: suco-helper
  type: ClusterIP
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: suco-helper
  namespace: suco
  labels:
    app: suco-helper
spec:
  selector:
    matchLabels:
      app: suco-helper
  template:
    metadata:
      labels:
        app: suco-helper
    spec:
      hostNetwork: false
      containers:
        - name: suco-helper
          # Image from the local registry on Brain Server (port 5000)
          image: local-registry:5000/suco-helper:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9000
              name: compile-port
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              memory: "8Gi"
          securityContext:
            privileged: false
          volumeMounts:
            - mountPath: /tmp
              name: temp-volume
      volumes:
        - name: temp-volume
          emptyDir: {}
